name: FinOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Setup Docker
        uses: docker/setup-buildx-action@v2

      - name: Build Docker Image
        run: |
          cd app
          docker build -t finance-ai .

      - name: Test Container
        run: |
          docker run -d finance-ai
          sleep 10
          docker ps