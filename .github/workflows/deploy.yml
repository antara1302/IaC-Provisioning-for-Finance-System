name: FinOps CI/CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      # 🐳 Setup Docker
      - name: Set up Docker
        uses: docker/setup-buildx-action@v2

      # 🐳 Build Image
      - name: Build Docker Image
        run: |
          cd app
          docker build -t finance-ai .

      # 🐳 Run container (test only)
      - name: Test Container
        run: |
          docker run -d -p 8501:8501 finance-ai
          sleep 10
          docker ps

      # ⚙️ Optional: Terraform validation (NOT deployment)
      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Init
        run: terraform init
        working-directory: terraform

      - name: Terraform Validate
        run: terraform validate
        working-directory: terraform